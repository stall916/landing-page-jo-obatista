<!DOCTYPE html>

    <title>EcoDoa</title>
    <link rel="stylesheet" href="style.css">

<body>

<header>
    <h1>EcoDoa</h1>
</header>

<main>
    <h2>O Problema</h2>
    <p>
        Muitas pessoas jogam fora alimentos que ainda poderiam ser consumidos,
        enquanto outras passam necessidade.
    </p>

    <h2>A Solução</h2>
    <p>
        O EcoDoa conecta pessoas que querem doar alimentos com quem precisa,
        ajudando a reduzir o desperdício.
    </p>
</main>

<footer>
    <p>Projeto escolar - 2026</p>
</footer>
