<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EcoDoa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>EcoDoa</h1>
</header>

<main>
    <h2>O Problema</h2>
    <p>
        Muitas pessoas jogam fora alimentos que ainda poderiam ser consumidos,
        enquanto outras passam necessidade.
    </p>

    <h2>A Solução</h2>
    <p>
        O EcoDoa conecta pessoas que querem doar alimentos com quem precisa,
        ajudando a reduzir o desperdício.
    </p>

    <h2>Contato</h2>
    <form>
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" placeholder="Seu nome"><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" placeholder="Seu email"><br><br>

        <label for="mensagem">Mensagem:</label><br>
        <textarea id="mensagem" placeholder="Escreva sua mensagem"></textarea><br><br>

        <button type="submit">Enviar</button>
    </form>
</main>

<footer>
    <p>Projeto escolar - 2026</p>
</footer>

</body>
</html>
